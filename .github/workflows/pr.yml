name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install pylint black
      - run: pip install -r requirements.txt
      - run: black --check --line-length 100 clod.py tests/
      - run: pylint clod.py --disable=C0114,C0115,C0116 --max-line-length=100 --fail-under=7.0

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/unit/ -v --tb=short --cov=clod --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unit
          fail_ci_if_error: false

  build-preview:
    name: Build Preview EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: python -m pip install -r requirements.txt pyinstaller
      - run: python -m PyInstaller clod.spec --noconfirm
      - run: dist\clod.exe --version
      - uses: actions/upload-artifact@v4
        with:
          name: clod-pr-${{ github.event.pull_request.number }}
          path: dist/clod.exe
          retention-days: 7
