name: 🤖 clod Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 1.2.3)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_NAME: clod
  PYTHON_VERSION: "3.11"

jobs:

  versioner:
    name: 📋 Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install pylint black
      - run: pip install -r requirements.txt
      - run: black --check --line-length 100 clod.py tests/
      - run: |
          pylint clod.py \
            --disable=C0114,C0115,C0116 \
            --max-line-length=100 \
            --fail-under=7.0

  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest tests/unit/ tests/test_clod.py -v --tb=short --cov=clod --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unit
          fail_ci_if_error: false

  build-windows:
    name: 🪟 Build Windows EXE
    runs-on: windows-latest
    needs: [versioner, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt pyinstaller
      - run: python -m PyInstaller clod.spec --noconfirm
      - run: dist\clod.exe --version
      - uses: actions/upload-artifact@v4
        with:
          name: clod-windows-${{ needs.versioner.outputs.version }}
          path: dist/clod.exe
          retention-days: 30

  build-linux:
    name: 🐧 Build Linux AppImage
    runs-on: ubuntu-latest
    needs: [versioner, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt pyinstaller
      - run: |
          pyinstaller \
            --onefile \
            --console \
            --name clod \
            --collect-all rich \
            clod.py
      - run: ./dist/clod --version
      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin \
                   AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps
          cp dist/clod AppDir/usr/bin/
          cat > AppDir/usr/share/applications/clod.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=clod
          Comment=Local Claude CLI using Ollama + Pipelines
          Exec=clod
          Icon=clod
          Categories=Development;Utility;
          Terminal=true
          DESKTOP
          python3 -c "
          import struct, zlib
          def png_chunk(name, data):
              c = struct.pack('>I', len(data)) + name + data
              return c + struct.pack('>I', zlib.crc32(c[4:]) & 0xffffffff)
          w, h = 32, 32
          raw = b'\\x00' + b'\\xff\\x00\\x00\\xff' * w
          compressed = zlib.compress(raw * h)
          png = b'\\x89PNG\\r\\n\\x1a\\n' + png_chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)) + png_chunk(b'IDAT', compressed) + png_chunk(b'IEND', b'')
          open('AppDir/usr/share/icons/hicolor/256x256/apps/clod.png', 'wb').write(png)
          "
          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/clod \
            --desktop-file AppDir/usr/share/applications/clod.desktop \
            --output appimage
          mv clod*.AppImage clod.AppImage 2>/dev/null || mv *clod*.AppImage clod.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: clod-linux-${{ needs.versioner.outputs.version }}
          path: clod.AppImage
          retention-days: 30

  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [build-windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
      - name: Download Windows EXE (for failure artifact)
        if: failure()
        uses: actions/download-artifact@v4
        with:
          name: clod-windows-${{ needs.versioner.outputs.version }}
          path: failed-artifacts/
      - name: Upload EXE as failure artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clod-integration-failure-${{ github.run_number }}
          path: failed-artifacts/clod.exe
          retention-days: 14

  release:
    name: 🚀 Create GitHub Release
    needs: [versioner, build-windows, build-linux, integration-tests]
    runs-on: ubuntu-latest
    if: needs.integration-tests.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/
      - name: Gather release files
        run: |
          mkdir -p release-files
          find release-artifacts -type f \( -name "clod.exe" -o -name "clod.AppImage" \) \
            -exec cp {} release-files/ \;
          ls -lah release-files/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.versioner.outputs.version }}"
          name: "clod v${{ needs.versioner.outputs.version }}"
          body: |
            ## clod — Local Claude CLI using Ollama + Pipelines

            A terminal CLI that mimics the Claude CLI UX but runs against your
            local [Omni AI stack](https://github.com/${{ github.repository }}).

            ### Features
            - Interactive REPL with conversation history
            - Tool use: bash execution, file read/write, SearXNG web search
            - Two-stage pipelines: local LLM draft → Claude review
            - Token budget tracking with offline mode
            - Project indexer: generates CLAUDE.md + README.md via local model
            - Rich markdown rendering with streaming output

            ### 📥 Downloads

            **Windows:**
            ```powershell
            curl -L -o clod.exe https://github.com/${{ github.repository }}/releases/download/v${{ needs.versioner.outputs.version }}/clod.exe
            .\clod.exe --help
            ```

            **Linux:**
            ```bash
            curl -L -o clod.AppImage https://github.com/${{ github.repository }}/releases/download/v${{ needs.versioner.outputs.version }}/clod.AppImage
            chmod +x clod.AppImage
            ./clod.AppImage --help
            ```

            ### Usage
            ```
            clod                           # interactive REPL
            clod -p "explain quicksort"    # one-shot
            clod --pipeline code_review    # local Qwen → Claude review
            clod --tools -p "list files"   # with tool use
            clod --index C:\projects       # generate CLAUDE.md for all projects
            ```

            ### Info
            - **Version**: `${{ needs.versioner.outputs.version }}`
            - **Build**: #${{ github.run_number }}
          files: release-files/*
          generate_release_notes: false
          draft: false
          prerelease: false
