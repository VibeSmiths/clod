version: 2

updates:

  # Python dependencies
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    groups:
      # Batch minor/patch updates for dev tools to reduce PR noise
      dev-tools:
        patterns:
          - "pytest*"
          - "coverage*"
          - "black"
          - "pylint"
          - "bandit*"
          - "pip-audit"
          - "responses"
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
