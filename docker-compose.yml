version: "3.8"

# ── Network topology (security) ───────────────────────────────────────────────
#
#  omni-internal  (isolated — no internet)
#    searxng, perplexica, n8n, chroma, omni-pipelines
#    + the OmniAI agent container (if running in Docker)
#
#  omni-gateway   (internet-capable — LiteLLM only)
#    litellm → api.anthropic.com, api.openai.com, etc.
#
#  LiteLLM bridges both: receives requests on omni-internal,
#  forwards to external providers on omni-gateway.
#  No other service has internet access.
#
networks:
  omni-internal:
    driver: bridge
    internal: true          # ← no internet egress from this network
  omni-gateway:
    driver: bridge          # LiteLLM's outbound network

services:

  # ── LiteLLM — secure unified LLM gateway ─────────────────────────────────────
  # All API keys live here. OmniAI calls localhost:4000 (OpenAI-compatible).
  # Enforces spend caps, rate limits, response caching, and fallback routing.
  # Ports are intentionally bound to localhost; this service is for internal
  # container-to-host communication only and is not exposed to other machines.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: omni-litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"  # localhost only — not exposed externally
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-omni-local-dev}
      - LITELLM_MAX_BUDGET=${LITELLM_MAX_BUDGET:-20.0}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    networks:
      - omni-internal   # receives requests from OmniAI / internal services
      - omni-gateway    # makes outbound calls to external LLM APIs
    extra_hosts:
      - "host-gateway:host-gateway"  # reaches host Ollama at 11434

  # ── OmniAI Pipelines — Claude review + multi-LLM routing ─────────────────────
  omni-pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: omni-pipelines
    restart: unless-stopped
    # This service provides internal pipeline routing. it listens on 9099
    # but the port is bound to 127.0.0.1 so nothing outside the host can access
    ports:
      - "127.0.0.1:9099:9099"  # localhost only
    volumes:
      - ./pipelines:/app/pipelines
      - pipelines-data:/app/data
    environment:
      # Pipelines routes through LiteLLM — no direct API key access needed
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY:-sk-omni-local-dev}
      - PIPELINES_DIR=/app/pipelines
    networks:
      - omni-internal
    depends_on:
      - litellm

  # ── SearXNG — private meta search engine ─────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    # search UI is accessible on localhost only; it's not exposed externally
    ports:
      - "127.0.0.1:8080:8080"  # localhost only
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    # s e a r x n g needs outbound DNS/HTTP for most engines; attach to the
    # `omni-gateway` network in addition to internal so it can resolve and
    # query external sites.  Without this you will see "temporary failure in
    # name resolution" errors and engines set to inactive.
    networks:
      - omni-internal
      - omni-gateway

  # ── Perplexica — AI web search ────────────────────────────────────────────────
  perplexica-backend:
    image: itzcrazykns1337/perplexica-backend:main
    container_name: perplexica-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./perplexica/config.toml:/home/perplexica/config.toml
      - perplexica-uploads:/home/perplexica/uploads
      - perplexica-db:/home/perplexica/data
    depends_on:
      - searxng

  perplexica-frontend:
    image: itzcrazykns1337/perplexica-frontend:main
    container_name: perplexica-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    depends_on:
      - perplexica-backend

  # ── n8n — automation workflows ────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    # automation workflows UI/API bound to localhost for internal use
    ports:
      - "127.0.0.1:5678:5678"  # localhost only
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
    networks:
      - omni-internal

  # ── Chroma — vector DB for persistent AI memory ───────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    restart: unless-stopped
    # vector database listens on localhost; keep internal only
    ports:
      - "127.0.0.1:8000:8000"  # localhost only
    volumes:
      - chroma-data:/chroma/chroma
    networks:
      - omni-internal

  # ── OmniAI agent — build from local Dockerfile in this folder ───────────────
  omni-ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: omni-ai:latest
    container_name: omni-ai
    restart: unless-stopped
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - SEARXNG_URL=${SEARXNG_URL:-http://searxng:8080}
      - CHROMA_URL=${CHROMA_URL:-http://chroma:8000}
      - PIPELINES_URL=${PIPELINES_URL:-http://omni-pipelines:9099}
    volumes:
      - omni_data:/root/.omni_ai
      - omni_backups:/app/backups
    networks:
      - omni-internal
      - omni-gateway
    depends_on:
      - litellm
      - searxng
      - chroma
      - omni-pipelines

# (You can paste the services from your other compose file here; e.g. nginx, stable-diffusion,
# ollama-*, open-webui, tts-*, etc.  They simply go at the same indentation level as
# the services above.)

volumes:
  perplexica-uploads: 
  perplexica-db:
  pipelines-data:
  n8n-data:
  chroma-data:
  omni_data:
  omni_backups:
