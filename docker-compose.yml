# ── Network topology (security) ───────────────────────────────────────────────
#
#  internal  (isolated — no internet)
#    n8n, chroma, pipelines, litellm (internal face)
#
#  gateway   (internet-capable)
#    litellm → api.anthropic.com, api.openai.com, etc.
#    searxng → external search engines
#
#  Services using network_mode: host (perplexica) bypass Docker networking.
#
networks:
  internal:
    driver: bridge
    internal: true
  gateway:
    driver: bridge
  default:
    driver: bridge

services:

  # ── Nginx — reverse proxy with path-based routing ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    ports:
      - "${NGINX_ROOT_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
      - default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - open-webui
      - litellm
      - pipelines
      - ollama

  # ── LiteLLM — unified LLM gateway ────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ${LITELLM_CONFIG_DIR}:/app/config:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - LITELLM_MAX_BUDGET=${LITELLM_MAX_BUDGET:-20.0}
    command: ["--config", "/app/config/config.yaml", "--port", "4000", "--detailed_debug"]
    networks:
      - internal
      - gateway
    extra_hosts:
      - "host-gateway:host-gateway"

  # ── Open WebUI ────────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    pull_policy: always
    container_name: ${OWUI_HOST:-open-webui}
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-8080}:8080"
    environment:
      - AUTOMATIC1111_BASE_URL=http://${SD_HOST:-stable-diffusion}:${SD_WEBUI_PORT:-7860}/
      - ENABLE_IMAGE_GENERATION=${ENABLE_IMAGE_GENERATION:-True}
      - IMAGE_GENERATION_ENGINE=${IMAGE_GENERATION_ENGINE:-automatic1111}
      - AUTOMATIC1111_API_AUTH=${AUTOMATIC1111_API_AUTH:-}
      - AUTOMATIC1111_CFG_SCALE=${AUTOMATIC1111_CFG_SCALE:-7.0}
      - AUTOMATIC1111_SAMPLER=${AUTOMATIC1111_SAMPLER:-DPM++ 2M}
      - AUTOMATIC1111_SCHEDULER=${AUTOMATIC1111_SCHEDULER:-Automatic}
      - IMAGE_GENERATION_MODEL=${IMAGE_GENERATION_MODEL:-v1-5-pruned-emaonly.safetensors [6ce0161689]}
      - AUDIO_TTS_ENGINE=openai
      - AUDIO_TTS_MODEL=tts-1-hd
      - AUDIO_TTS_VOICE=${TTS_VOICE:-echo}
      - AUDIO_TTS_SPLIT_ON=punctuation
      - AUDIO_TTS_OPENAI_API_BASE_URL=http://${TTS_HOST:-tts}:${TTS_PORT:-8000}/v1
      - AUDIO_TTS_OPENAI_API_KEY="${TTS_PORT:-8000}${TTS_HOST:-tts}"
      - OLLAMA_BASE_URL=http://${OLLAMA_HOST:-ollama}:${OLLAMA_PORT:-11434}
      - ENABLE_RAG_WEB_SEARCH=${ENABLE_RAG_WEB_SEARCH:-True}
      - RAG_WEB_SEARCH_ENGINE=${RAG_WEB_SEARCH_ENGINE:-searxng}
      - RAG_WEB_SEARCH_RESULT_COUNT=${RAG_WEB_SEARCH_RESULT_COUNT:-3}
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=${RAG_WEB_SEARCH_CONCURRENT_REQUESTS:-30}
      - SEARXNG_QUERY_URL=http://${SEARXNG_HOST:-searxng}:${SEARXNG_PORT:-8080}/search?q=<query>&format=json
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}
      - ENABLE_OAUTH_SIGNUP=${ENABLE_OAUTH_SIGNUP:-false}
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=${OAUTH_MERGE_ACCOUNTS_BY_EMAIL:-false}
      - DEFAULT_ROLE_ON_SIGNUP=${DEFAULT_ROLE_ON_SIGNUP:-user}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_TENANT_ID=${MICROSOFT_CLIENT_TENANT_ID:-9188040d-6c67-4c5b-b112-36a304b66dad}
      - OPENAI_API_BASE_URL=http://host.docker.internal:9099/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
    volumes:
      - owui_data:/app/backend/data:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Pipelines — multi-LLM routing ────────────────────────────────────────────
  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    container_name: pipelines
    restart: unless-stopped
    ports:
      - "${PIPELINES_PORT:-9099}:9099"
    volumes:
      - ${PIPELINES_DIR}:/app/pipelines
      - pipelines_data:/app/data
    environment:
      - LITELLM_BASE_URL=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - PIPELINES_API_KEY=${LITELLM_MASTER_KEY:-sk-local-dev}
      - PIPELINES_DIR=/app/pipelines
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_URL=http://ollama:11434
    networks:
      - internal
    depends_on:
      - litellm
      - ollama

  # ── SearXNG — private meta search engine ─────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    pull_policy: always
    container_name: ${SEARXNG_HOST:-searxng}
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    volumes:
      - ${SEARXNG_CONFIG_DIR}:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=https://${SEARXNG_HOSTNAME:-localhost}/
      - UWSGI_WORKERS=${SEARXNG_UWSGI_WORKERS:-4}
      - UWSGI_THREADS=${SEARXNG_UWSGI_THREADS:-4}
      - TRUSTED_NETWORKS="10.0.0.0/8,192.168.0.0/16,192.168.50.0/16,127.0.0.1/8,172.16.0.0/14"
      - SEARXNG_DEBUG=true
      - SEARXNG_API__ENABLED=true
      - SEARXNG_API__REQUIRE_API_KEY=false
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    networks:
      - internal
      - gateway

  # ── Perplexica — AI web search ────────────────────────────────────────────────
  perplexica-backend:
    image: itzcrazykns1337/perplexica-backend:main
    container_name: perplexica-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${PERPLEXICA_CONFIG_DIR}/config.toml:/home/perplexica/config.toml
      - perplexica_uploads:/home/perplexica/uploads
      - perplexica_db:/home/perplexica/data
    depends_on:
      - searxng

  perplexica-frontend:
    image: itzcrazykns1337/perplexica-frontend:main
    container_name: perplexica-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    depends_on:
      - perplexica-backend

  # ── n8n — automation workflows ────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_PATH=/n8n/
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - WEBHOOK_URL=http://localhost/n8n
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
    networks:
      - internal

  # ── Chroma — vector DB ────────────────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - internal

  # ── Stable Diffusion ──────────────────────────────────────────────────────────
  # To skip the build and pull a pre-built image, set SD_IMAGE in .env and
  # comment out the build block.
  # GPU passthrough requires the nvidia/amd container toolkit on the host.
  stable-diffusion:
    image: ghcr.io/xander-rudolph/stable-diffusion:latest
    pull_policy: always
    container_name: ${SD_HOST:-stable-diffusion}
    restart: unless-stopped
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    ports:
      - "${SD_WEBUI_PORT:-7860}:7860"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    volumes:
      - sd_ckpt_models:/data/models/Stable-diffusion:rw
      - sd_lora_models:/data/models/Lora:rw
      - sd_output:/outputs:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${GPU_DRIVER:-nvidia}
              count: all
              capabilities: [gpu]

  # ── Ollama ────────────────────────────────────────────────────────────────────
  # Set OLLAMA_IMAGE in .env to match your hardware:
  #   NVIDIA:  ollama/ollama
  #   AMD:     ollama/ollama:rocm
  #   CPU:     ollama/ollama:latest
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    pull_policy: always
    container_name: ${OLLAMA_HOST:-ollama}
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama/models:rw
    environment:
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-r1:1.5b}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    networks:
      - internal
      - default
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${GPU_DRIVER:-nvidia}
              count: all
              capabilities: [gpu]

  # ── TTS ───────────────────────────────────────────────────────────────────────
  # Set TTS_IMAGE in .env to match your hardware:
  #   NVIDIA:  ghcr.io/matatonic/openedai-speech
  #   AMD:     ghcr.io/matatonic/openedai-speech:rocm
  tts:
    image: ${TTS_IMAGE:-ghcr.io/matatonic/openedai-speech}
    pull_policy: always
    container_name: ${TTS_HOST:-tts}
    restart: unless-stopped
    ports:
      - "${TTS_PORT:-8000}:8000"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      - API_KEY="${TTS_PORT:-8000}${TTS_HOST:-tts}"
    volumes:
      - voices:/app/voices:rw
      - tts_config:/app/config:rw
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${GPU_DRIVER:-nvidia}
              count: all
              capabilities: [gpu]

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  # Host-bound volumes — all paths set in .env
  perplexica_uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${PERPLEXICA_UPLOADS}"
  perplexica_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${PERPLEXICA_DB}"  
  pipelines_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${PIPELINES_DATA}"  
  n8n_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${N8N_DATA}"
  chroma_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${CHROMA_DATA}"
  ollama_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${OLLAMA_DATA_DIR}"
  owui_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${OWUI_DATA_DIR}"
  sd_ckpt_models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${SD_CKPT_MODELS_DIR}"
  sd_lora_models:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${SD_LORA_MODELS_DIR}"
  sd_output:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${SD_OUTPUT_DIR}"
  voices:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${VOICES_DIR}"
  tts_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${TTS_CONFIG_DIR}"
