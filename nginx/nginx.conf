# ── Upstream definitions ──────────────────────────────────────────────────────
upstream open_webui  { server open-webui:8080; }
upstream litellm     { server litellm:4000; }
upstream pipelines   { server pipelines:9099; }
upstream ollama      { server ollama:11434; }
upstream chroma      { server chroma:8000; }
upstream searxng     { server searxng:8080; }
upstream n8n         { server n8n:5678; }
upstream stablediff  { server stable-diffusion:7860; }

# WebSocket connection upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;
    proxy_read_timeout    300s;
    proxy_connect_timeout 10s;

    # ── OpenWebUI — main UI at root ───────────────────────────────────────────
    location / {
        proxy_pass http://open_webui;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }

    # ── LiteLLM — unified LLM API gateway ────────────────────────────────────
    location /litellm/ {
        proxy_pass http://litellm/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Pipelines — OpenWebUI pipeline API ───────────────────────────────────
    location /pipelines/ {
        proxy_pass http://pipelines/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Ollama — local LLM inference API ─────────────────────────────────────
    location /ollama/ {
        proxy_pass http://ollama/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── ChromaDB — vector database API ───────────────────────────────────────
    location /chroma/ {
        proxy_pass http://chroma/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SearXNG — private meta-search ────────────────────────────────────────
    # Note: static assets load from /, search works but styling may be missing
    location /search/ {
        proxy_pass http://searxng/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── n8n — automation workflows ────────────────────────────────────────────
    # Requires N8N_PATH=/n8n/ in docker-compose environment
    location /n8n/ {
        proxy_pass http://n8n/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }

    # ── Stable Diffusion WebUI ────────────────────────────────────────────────
    # Note: some UI assets may not load at subpath; use :7860 for full UI
    location /sd/ {
        proxy_pass http://stablediff/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }

    # ── Perplexica — AI web search ────────────────────────────────────────────
    # Runs on host network; use direct port :3000 for the full UI experience
    location /perplexica/ {
        proxy_pass http://host.docker.internal:3000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
