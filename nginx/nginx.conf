# ── Upstream definitions ──────────────────────────────────────────────────────
upstream open_webui  { server open-webui:8080; }
upstream litellm     { server litellm:4000; }
upstream pipelines   { server pipelines:9099; }
upstream ollama      { server ollama:11434; }
upstream chroma      { server chroma:8000; }
upstream searxng     { server searxng:8080; }

# WebSocket connection upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Docker embedded DNS — needed for variable-based proxy_pass (deferred resolution)
    resolver 127.0.0.11 valid=30s;

    client_max_body_size 100M;
    proxy_read_timeout    300s;
    proxy_connect_timeout 10s;

    # ── OpenWebUI — main UI at root ───────────────────────────────────────────
    location / {
        proxy_pass http://open_webui;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }

    # ── LiteLLM — unified LLM API gateway ────────────────────────────────────
    location /litellm/ {
        proxy_pass http://litellm/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Pipelines — OpenWebUI pipeline API ───────────────────────────────────
    # Auth header injected so localhost/pipelines/ works without credentials.
    # Key must match PIPELINES_API_KEY in docker-compose (sk-local-dev).
    location /pipelines/ {
        proxy_pass http://pipelines/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     "Bearer sk-local-dev";
    }

    # ── Ollama — local LLM inference API ─────────────────────────────────────
    location /ollama/ {
        proxy_pass http://ollama/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── ChromaDB — vector database API ───────────────────────────────────────
    location /chroma/ {
        proxy_pass http://chroma/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SearXNG — private meta-search ────────────────────────────────────────
    # Note: static assets load from /, search works but styling may be missing
    location /search/ {
        proxy_pass http://searxng/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── n8n — automation workflows ────────────────────────────────────────────
    # n8n's webpack build uses root-relative asset paths (/assets/...) regardless
    # of N8N_PATH, so subpath proxying breaks asset loading. Redirect to direct
    # port instead; n8n serves at / on :5678 with no subpath config.
    location /n8n {
        return 301 http://$host:5678/;
    }

    # ── Stable Diffusion WebUI ────────────────────────────────────────────────
    # Variable proxy_pass defers DNS resolution so nginx starts even when
    # stable-diffusion container is not running (profile service).
    # Note: some UI assets may not load at subpath; use :7860 for full UI.
    location /sd/ {
        set $sd_backend http://stable-diffusion:7860;
        proxy_pass $sd_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
    }
}
