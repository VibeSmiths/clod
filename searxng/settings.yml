use_default_settings: false  # start with a minimal engine list so we don't load absent or internet-only engines

general:
  debug: false
  instance_name: "Omni Search"

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  formats:
    - html
    - json

server:
  secret_key: "omni-searxng-secret-key-change-me"
  limiter: false
  image_proxy: true
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true

engines:
  - name: google
    engine: google
    shortcut: g
  - name: bing
    engine: bing
    shortcut: b
  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
  - name: github
    engine: github
    shortcut: gh
  - name: arxiv
    engine: arxiv
    shortcut: ar
  - name: wikipedia
    engine: wikipedia
    shortcut: w

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
